version: '3.9'

# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # from .env — never hardcode in prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports: []   # don't expose DB port publicly in production

  redis:
    ports: []   # don't expose Redis port publicly in production
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}

  backend:
    restart: always
    environment:
      NODE_ENV:     production
      REDIS_URL:    redis://:${REDIS_PASSWORD}@redis:6379
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
      resources:
        limits:
          cpus:   '1'
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: affirmation_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro       # mount TLS certs here
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s

  n8n:
    restart: always
    environment:
      N8N_BASIC_AUTH_PASSWORD: ${N8N_ADMIN_PASSWORD}
    ports: []   # don't expose n8n directly — proxy through nginx /n8n/

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  nginx_logs:
